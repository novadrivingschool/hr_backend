<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Organigram</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 28px;
            font-family: Arial, Helvetica, sans-serif;
            background: #ffffff;
            color: #1f2937;
        }

        .page {
            min-width: 2600px;
            padding: 10px 20px 60px;
        }

        .main-title {
            text-align: center;
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .sub-title {
            text-align: center;
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 30px;
        }

        .org-root {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .top-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 22px;
            width: 100%;
            margin-bottom: 6px;
        }

        .vertical-line {
            width: 3px;
            background: #94a3b8;
            margin: 0 auto;
            border-radius: 999px;
        }

        .horizontal-line {
            height: 3px;
            background: #cbd5e1;
            width: 100%;
            margin: 0 auto;
            border-radius: 999px;
        }

        .v-20 {
            height: 20px;
        }

        .v-24 {
            height: 24px;
        }

        .v-28 {
            height: 28px;
        }

        .v-36 {
            height: 36px;
        }

        .v-44 {
            height: 44px;
        }

        .node {
            background: #fff;
            border-radius: 18px;
            padding: 14px 18px;
            min-width: 240px;
            text-align: center;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
            position: relative;
        }

        .node.top {
            border: 2px solid #2563eb;
            background: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%);
        }

        .node.coordinator {
            border: 2px solid #16a34a;
            background: linear-gradient(180deg, #ecfdf5 0%, #ffffff 100%);
        }

        .node.staff {
            border: 2px solid #cbd5e1;
            background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
            min-width: 230px;
        }

        .node.department {
            min-width: 320px;
            border: 3px solid #f59e0b;
            background: linear-gradient(180deg, #fff7ed 0%, #ffffff 100%);
            box-shadow: 0 12px 26px rgba(245, 158, 11, 0.15);
        }

        .department-title {
            font-size: 22px;
            font-weight: 800;
            color: #9a3412;
            margin-bottom: 6px;
        }

        .department-meta {
            font-size: 13px;
            color: #7c2d12;
        }

        .person-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.25;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-top: 8px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: 700;
            line-height: 1;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .chip.top-primary {
            background: #dbeafe;
            color: #1d4ed8;
            border-color: #93c5fd;
        }

        .chip.coordinator-primary {
            background: #dcfce7;
            color: #15803d;
            border-color: #86efac;
        }

        .chip.secondary {
            background: #f8fafc;
            color: #475569;
            border-color: #cbd5e1;
            font-weight: 600;
        }

        .chip.department-chip {
            background: #ffedd5;
            color: #c2410c;
            border-color: #fdba74;
        }

        .departments-section {
            width: 100%;
            margin-top: 6px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }

        .departments-trunk-wrap {
            width: 100%;
            padding: 0 80px;
            margin-bottom: 0;
        }

        .departments-row {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: flex-start;
            gap: 30px;
            width: max-content;
            min-width: 100%;
            padding-top: 0;
        }

        .department-tree {
            width: 520px;
            min-width: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding-top: 0;
        }

        .department-label {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #b45309;
            margin-bottom: 10px;
        }

        .section-caption {
            font-size: 12px;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 8px;
        }

        .coordinators-wrap,
        .staff-wrap {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .coordinators-row,
        .staff-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            width: 100%;
            position: relative;
        }

        .connector-group,
        .staff-cluster {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .person-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 220px;
        }

        .empty-box {
            border: 2px dashed #cbd5e1;
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 13px;
            color: #64748b;
            background: #f8fafc;
            min-width: 220px;
            text-align: center;
        }

        .top-section-label {
            margin-bottom: 10px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #1d4ed8;
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="main-title">Company Organigram</div>
        <div class="sub-title" id="generatedAt"></div>

        <div class="org-root" id="app"></div>
    </div>

    <script>
        const data = __ORG_DATA__;

        function el(tag, className, text) {
            const node = document.createElement(tag);
            if (className) node.className = className;
            if (text !== undefined && text !== null) node.textContent = text;
            return node;
        }

        function uniqueValues(items) {
            return [...new Set((items || []).map(v => String(v || '').trim()).filter(Boolean))];
        }

        function getTopPrimaryPositions(positions) {
            return uniqueValues(positions).filter(p => {
                const val = p.toLowerCase();
                return val === 'director' || val === 'manager';
            });
        }

        function getCoordinatorPrimaryPositions(positions) {
            return uniqueValues(positions).filter(p => p.toLowerCase() === 'coordinator');
        }

        function getSecondaryPositions(positions, type) {
            const unique = uniqueValues(positions);

            if (type === 'top') {
                return unique.filter(p => {
                    const val = p.toLowerCase();
                    return val !== 'director' && val !== 'manager';
                });
            }

            if (type === 'coordinator') {
                return unique.filter(p => p.toLowerCase() !== 'coordinator');
            }

            return unique;
        }

        function createChips(chips, className) {
            const wrap = el('div', 'chips');
            chips.forEach(text => {
                wrap.appendChild(el('span', `chip ${className}`, text));
            });
            return wrap;
        }

        function personNode(person, type) {
            const node = el('div', `node ${type}`);
            const positions = uniqueValues(person.positions || []);

            node.appendChild(el('div', 'person-name', person.full_name || person.employee_number));

            if (type === 'top') {
                const primary = getTopPrimaryPositions(positions);
                const secondary = getSecondaryPositions(positions, 'top');

                if (primary.length) {
                    node.appendChild(createChips(primary, 'top-primary'));
                } else {
                    node.appendChild(createChips(['Top Management'], 'top-primary'));
                }

                if (secondary.length) {
                    node.appendChild(createChips(secondary, 'secondary'));
                }
            } else if (type === 'coordinator') {
                const primary = getCoordinatorPrimaryPositions(positions);
                const secondary = getSecondaryPositions(positions, 'coordinator');

                node.appendChild(createChips(primary.length ? primary : ['Coordinator'], 'coordinator-primary'));

                if (secondary.length) {
                    node.appendChild(createChips(secondary, 'secondary'));
                }
            } else {
                if (positions.length) {
                    node.appendChild(createChips(positions, 'secondary'));
                } else {
                    node.appendChild(createChips(['No Position'], 'secondary'));
                }
            }

            return node;
        }

        function departmentHeader(department) {
            const node = el('div', 'node department');
            node.appendChild(el('div', 'department-title', department.department));
            node.appendChild(el('div', 'department-meta', `${department.total_members || 0} members`));

            const infoChips = el('div', 'chips');
            infoChips.appendChild(el('span', 'chip department-chip', `${(department.coordinators || []).length} Coordinators`));
            infoChips.appendChild(el('span', 'chip department-chip', `${(department.staff || []).length} Staff`));
            node.appendChild(infoChips);

            return node;
        }

        function buildTopManagement(root) {
            root.appendChild(el('div', 'top-section-label', 'Top Management'));

            const topRow = el('div', 'top-row');

            if (Array.isArray(data.top_management) && data.top_management.length) {
                data.top_management.forEach(person => {
                    topRow.appendChild(personNode(person, 'top'));
                });
            } else {
                topRow.appendChild(el('div', 'empty-box', 'No top management found'));
            }

            root.appendChild(topRow);
        }

        function buildDepartmentTree(department) {
            const wrapper = el('div', 'department-tree');

            wrapper.appendChild(el('div', 'vertical-line v-24'));
            wrapper.appendChild(el('div', 'department-label', 'Department'));
            wrapper.appendChild(departmentHeader(department));
            wrapper.appendChild(el('div', 'vertical-line v-24'));

            const coordinatorsWrap = el('div', 'coordinators-wrap');
            coordinatorsWrap.appendChild(el('div', 'section-caption', 'Coordinators'));

            if (department.coordinators && department.coordinators.length) {
                const coordinatorGroup = el('div', 'connector-group');

                if (department.coordinators.length > 1) {
                    coordinatorGroup.appendChild(el('div', 'horizontal-line'));
                    coordinatorGroup.appendChild(el('div', 'vertical-line v-24'));
                }

                const coordinatorsRow = el('div', 'coordinators-row');

                department.coordinators.forEach(person => {
                    const col = el('div', 'person-column');
                    col.appendChild(personNode(person, 'coordinator'));
                    coordinatorsRow.appendChild(col);
                });

                coordinatorGroup.appendChild(coordinatorsRow);
                coordinatorsWrap.appendChild(coordinatorGroup);
            } else {
                coordinatorsWrap.appendChild(el('div', 'empty-box', 'No coordinator assigned'));
            }

            wrapper.appendChild(coordinatorsWrap);
            wrapper.appendChild(el('div', 'vertical-line v-24'));

            const staffWrap = el('div', 'staff-wrap');
            staffWrap.appendChild(el('div', 'section-caption', 'Staff'));

            if (department.staff && department.staff.length) {
                const staffCluster = el('div', 'staff-cluster');

                if (department.staff.length > 1) {
                    staffCluster.appendChild(el('div', 'horizontal-line'));
                    staffCluster.appendChild(el('div', 'vertical-line v-24'));
                }

                const staffRow = el('div', 'staff-row');

                department.staff.forEach(person => {
                    const col = el('div', 'person-column');
                    col.appendChild(personNode(person, 'staff'));
                    staffRow.appendChild(col);
                });

                staffCluster.appendChild(staffRow);
                staffWrap.appendChild(staffCluster);
            } else {
                staffWrap.appendChild(el('div', 'empty-box', 'No staff assigned'));
            }

            wrapper.appendChild(staffWrap);

            return wrapper;
        }

        function render() {
            const app = document.getElementById('app');
            document.getElementById('generatedAt').textContent =
                `Generated at: ${data.generated_at || ''}`;

            buildTopManagement(app);
            app.appendChild(el('div', 'vertical-line v-44'));

            const departmentsSection = el('div', 'departments-section');
            const trunkWrap = el('div', 'departments-trunk-wrap');
            trunkWrap.appendChild(el('div', 'horizontal-line'));

            const departmentsRow = el('div', 'departments-row');

            (data.departments || []).forEach(department => {
                departmentsRow.appendChild(buildDepartmentTree(department));
            });

            departmentsSection.appendChild(trunkWrap);
            departmentsSection.appendChild(departmentsRow);
            app.appendChild(departmentsSection);
        }

        render();
    </script>
</body>

</html>
